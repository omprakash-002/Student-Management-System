<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management - Login</title>

```
<style>

    body {
        font-family: Arial, sans-serif;
        background-color: #f4f6f9;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .container {
        width: 350px;
        background: white;
        padding: 25px;
        border-radius: 8px;
        box-shadow: 0px 2px 10px rgba(0,0,0,0.2);
    }

    h2 {
        text-align: center;
        color: #333;
    }

    label {
        font-weight: bold;
    }

    input {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        margin-bottom: 15px;
        box-sizing: border-box;
    }

    button {
        width: 100%;
        padding: 10px;
        background-color: #4CAF50;
        color: white;
        border: none;
        cursor: pointer;
    }

    button:hover {
        background-color: #45a049;
    }

    #errorMsg {
        color: red;
        margin-top: 10px;
        text-align: center;
    }

    .register-link {
        text-align: center;
        margin-top: 15px;
    }

</style>
```

</head>

<body>

```
<div class="container">

    <h2>Student Management Login</h2>

    <label for="user">Username</label>
    <input
        type="text"
        id="user"
        placeholder="Enter Username">

    <label for="pass">Password</label>
    <input
        type="password"
        id="pass"
        placeholder="Enter Password">

    <button onclick="login()">
        Login
    </button>

    <div id="errorMsg"></div>

    <div class="register-link">
        New Student?
        <a href="register.html">
            Register Here
        </a>
    </div>

</div>

<script src="js/login.js"></script>
```

</body>
</html>
