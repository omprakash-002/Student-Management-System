<!DOCTYPE html>
<html>

<head>
    <title>Student List</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 20px;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: white;
            padding: 20px;
            border: 1px solid #ccc;
        }

        h2 {
            text-align: center;
        }

        input {
            padding: 8px;
            width: 250px;
        }

        button {
            padding: 8px 12px;
            cursor: pointer;
            margin-left: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        table,
        th,
        td {
            border: 1px solid #ccc;
        }

        th,
        td {
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #f2f2f2;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>Student List</h2>

    <label for="searchText">
        Search Student
    </label>

    <input
        type="text"
        id="searchText"
        placeholder="Enter Student Name"
        onkeyup="searchStudents()">

    <button onclick="sortStudents()">
        Sort By Name
    </button>

    <table>

        <thead>

            <tr>
                <th>Roll No</th>
                <th>Name</th>
                <th>Department</th>
                <th>Email</th>
                <th>Mobile</th>
                <th>Actions</th>
            </tr>

        </thead>

        <tbody id="studentBody">
        </tbody>

    </table>

    <br>

    <a href="dashboard.html">
        Back To Dashboard
    </a>

</div>

<script src="js/students.js"></script>

</body>
</html>
